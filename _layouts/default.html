<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <nav>
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/about' | relative_url }}">About</a>
      <a href="{{ '/projects' | relative_url }}">Projects</a>
      <a href="{{ '/blog' | relative_url }}">Blog</a>
    </nav>
  </header>
  
  <main class="site-content">
    {{ content }}
  </main>
  
  <footer class="site-footer">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.name }}. All rights reserved.</p>
    <div class="social-links">
      {% if site.github %}
      <a href="https://github.com/{{ site.github }}" target="_blank">GitHub</a>
      {% endif %}
      {% if site.linkedin %}
      <a href="https://linkedin.com/in/{{ site.linkedin }}" target="_blank">LinkedIn</a>
      {% endif %}
      {% if site.twitter %}
      <a href="https://twitter.com/{{ site.twitter }}" target="_blank">Twitter</a>
      {% endif %}
    </div>
  </footer>
</body>
</html>
